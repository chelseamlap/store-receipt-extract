<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>store-receipt-extract</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 13px/1.4 system-ui, sans-serif; width: 320px; margin: 0; padding: 12px; }
      .brand { display: flex; align-items: center; gap: 8px; margin: 0 0 10px; }
      .brand img { width: 32px; height: 32px; flex: none; }
      h1 { font-size: 14px; margin: 0; }
      .retailer { border: 1px solid color-mix(in srgb, currentColor 20%, transparent); border-radius: 8px; padding: 10px; margin-bottom: 10px; }
      .retailer h2 { font-size: 13px; margin: 0 0 6px; text-transform: capitalize; }
      .stats { font-size: 12px; opacity: 0.85; margin: 4px 0 8px; }
      .stats span { font-variant-numeric: tabular-nums; }
      button { font: inherit; padding: 5px 10px; border-radius: 6px; border: 1px solid color-mix(in srgb, currentColor 30%, transparent); background: transparent; cursor: pointer; }
      button:hover { background: color-mix(in srgb, currentColor 10%, transparent); }
      button:disabled { opacity: 0.5; cursor: default; }
      .row { display: flex; gap: 6px; flex-wrap: wrap; }
      #status { font-size: 12px; min-height: 16px; margin-top: 8px; opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="brand">
      <img src="../icons/logo.svg" alt="" />
      <h1>store-receipt-extract</h1>
    </div>

    <section class="retailer" data-retailer="target">
      <h2>Target</h2>
      <div class="stats">
        Orders: <span data-count>—</span> · Last scan: <span data-lastscan>never</span>
      </div>
      <div class="row">
        <button data-action="scan">Scan</button>
        <button data-action="rescan">Rescan all</button>
        <button data-action="export-csv">Export CSV</button>
        <button data-action="export-json">Export JSON</button>
      </div>
    </section>

    <section class="retailer" data-retailer="costco">
      <h2>Costco</h2>
      <div class="stats">
        Orders: <span data-count>—</span> · Last scan: <span data-lastscan>never</span>
      </div>
      <div class="row">
        <button data-action="scan">Scan</button>
        <button data-action="rescan">Rescan all</button>
        <button data-action="export-csv">Export CSV</button>
        <button data-action="export-json">Export JSON</button>
      </div>
    </section>

    <div id="status" role="status" aria-live="polite"></div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
